  <!-- Global Loading Bar -->
    @if (isLoading()) {
      <div class="global-loading-bar">
        <div class="loading-progress"></div>
      </div>
    }

    <!-- Toast Container -->
    <div class="toast-container">
      @for (toast of toasts(); track toast.id) {
        <div class="toast toast--{{ toast.type }}" @toastEnter>
          <span class="toast__icon">{{ toastIcon(toast.type) }}</span>
          <span class="toast__msg">{{ toast.message }}</span>
          <button class="toast__close" (click)="removeToast(toast.id)">✕</button>
        </div>
      }
    </div>

    @if (isLoggedIn()) {
      <!-- App Shell with Sidebar -->
      <div class="app-shell">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
          <div class="sidebar__brand">
            <div class="brand-icon">⚕</div>
            <div class="brand-text">
              <span class="brand-name">PharmaTrack</span>
              <span class="brand-sub">Pro Edition</span>
            </div>
          </div>

          <nav class="sidebar__nav">
            <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
              <span class="nav-icon">⊞</span>
              <span>Dashboard</span>
            </a>
            <a routerLink="/inventory" routerLinkActive="active" class="nav-link">
              <span class="nav-icon">◫</span>
              <span>Inventory</span>
            </a>
            <a routerLink="/billing" routerLinkActive="active" class="nav-link">
              <span class="nav-icon">▣</span>
              <span>Billing</span>
            </a>
            <a routerLink="/stock-ledger" routerLinkActive="active" class="nav-link">
              <span class="nav-icon">≡</span>
              <span>Stock Ledger</span>
            </a>
          </nav>

          <div class="sidebar__footer">
            <div class="user-pill">
              <div class="user-avatar">{{ userInitial() }}</div>
              <div class="user-info">
                <span class="user-name">{{ userName() }}</span>
                <span class="user-role">{{ userRole() }}</span>
              </div>
            </div>
            <button class="logout-btn" (click)="logout()">⏻ Logout</button>
          </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
          <div [@routeAnimation]="getRouteState()" class="route-wrapper">
            <router-outlet></router-outlet>
          </div>
        </main>
      </div>
    } @else {
      <!-- Auth Layout (no sidebar) -->
      <div class="auth-layout">
        <router-outlet></router-outlet>
      </div>
    }
